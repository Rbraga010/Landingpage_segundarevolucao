<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Workshop LHA + AI | Rodrigo Braga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Outfit', 'sans-serif'],
            },
            colors: {
              background: '#070514', // Deep dark purple/blue
              surface: '#0f0c24',    // Surface dark
              primary: '#EAB308',    // Gold Yellow 500
              'primary-hover': '#FACC15', // Gold Yellow 400
              accent: '#8E2DE2',     // Purple neon
              'accent-hover': '#4A00E0',
              text: {
                main: '#ffffff',
                muted: '#94a3b8',
              },
              border: '#ffffff1a',   // White 10%
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              glow: {
                '0%': { boxShadow: '0 0 20px rgba(0, 242, 254, 0.2)' },
                '100%': { boxShadow: '0 0 30px rgba(142, 45, 226, 0.6)' },
              },
              spin: {
                '0%': { transform: 'translate(-50%, -50%) rotate(0deg)' },
                '100%': { transform: 'translate(-50%, -50%) rotate(360deg)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #070514;
        color: #ffffff;
        overflow-x: hidden;
      }

      /* Tech Grid Background */
      .bg-tech-grid {
        background-size: 50px 50px;
        background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
      }

      /* Floating Radial Gradient */
      .radial-glow {
        background: radial-gradient(circle, rgba(142, 45, 226, 0.2) 0%, rgba(0, 242, 254, 0.15) 30%, transparent 70%);
        filter: blur(60px);
        pointer-events: none;
      }

      /* Glass Card (Premium Glassmorphism) */
      .glass-card {
        background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.01) 100%);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-top: 1px solid rgba(255, 255, 255, 0.25);
        border-left: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        border-radius: 1.25rem;
      }

      .glass-card-neon {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 242, 254, 0.15);
      }

      .glass-card-purple {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(142, 45, 226, 0.2);
      }

      /* Glass Pill (for toggles and badges) */
      .glass-pill {
        background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-top: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        border-radius: 9999px;
      }

      /* Progress Bar Track */
      .progress-track {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(4px);
        border-radius: 9999px;
        overflow: hidden;
      }

      /* Glowing fill for progress and toggles */
      .glow-fill {
        background: linear-gradient(90deg, #00F2FE 0%, #8E2DE2 100%);
        box-shadow: 0 0 10px rgba(0, 242, 254, 0.7);
      }

      /* Toggle switch thumb */
      .toggle-thumb {
        background: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset -2px -2px 4px rgba(0,0,0,0.2);
        border-radius: 50%;
      }

      /* Neon Text Styles */
      .text-neon-cyan {
        color: #00F2FE;
        text-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
      }
      .text-neon-purple {
        color: #8E2DE2;
        text-shadow: 0 0 10px rgba(142, 45, 226, 0.4);
      }

      /* STANDARD CTA BUTTON STYLE */
      .btn-neon {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border-radius: 0.5rem;
        color: white;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        background: transparent;
        transition: all 0.3s ease;
        z-index: 10;
        box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
        border: 0; 
      }

      /* The Spinning Border Background */
      .btn-neon::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 400%; 
        height: 400%;
        background: conic-gradient(
            from 0deg, 
            #8E2DE2 0%,    
            #00F2FE 45%,   
            #ffffff 50%,   
            #00F2FE 55%,   
            #8E2DE2 100%   
        );
        transform: translate(-50%, -50%);
        animation: spin 3s linear infinite;
        z-index: -2;
      }

      /* The Inner Mask */
      .btn-neon::after {
        content: '';
        position: absolute;
        inset: 2px;
        background: #070514; /* Same as body bg */
        border-radius: 0.4rem;
        z-index: -1;
      }

      .btn-neon:hover {
        box-shadow: 0 0 25px rgba(0, 242, 254, 0.5);
        transform: translateY(-2px);
      }

      /* Marquee Animation */
      @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      
      .animate-scroll {
        animation: scroll 60s linear infinite;
      }
      
      .animate-scroll:hover {
        animation-play-state: paused;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",

  }
}
</script>
</head>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
