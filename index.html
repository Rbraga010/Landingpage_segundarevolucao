    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Outfit', 'sans-serif'],
            },
            colors: {
              background: '#070514', // Deep dark purple/blue
              surface: '#0f0c24',    // Surface dark
              primary: '#C5A572',      // Gold PulsarH
              'primary-hover': '#E8D5B0', // Light gold
              accent: '#6B2D8B',       // Purple PulsarH
              'accent-hover': '#8B5CB8',
              navy: '#0D1847',         // Marinho PulsarH
              'navy-light': '#1A2355',
              text: {
                main: '#ffffff',
                muted: '#94a3b8',
              },
              border: '#ffffff1a',   // White 10%
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              glow: {
                '0%': { boxShadow: '0 0 20px rgba(107, 45, 139, 0.2)' },
                '100%': { boxShadow: '0 0 30px rgba(197, 165, 114, 0.5)' },
              },
              spin: {
                '0%': { transform: 'translate(-50%, -50%) rotate(0deg)' },
                '100%': { transform: 'translate(-50%, -50%) rotate(360deg)' },
              }
            }
          }
        }
      }

    <style>
      body {
        background-color: #070514;
        color: #ffffff;
        overflow-x: hidden;
      }

      /* Tech Grid Background */
      .bg-tech-grid {
        background-size: 50px 50px;
        background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
      }

      /* Floating Radial Gradient */
      .radial-glow {
        background: radial-gradient(circle, rgba(107, 45, 139, 0.2) 0%, rgba(197, 165, 114, 0.12) 30%, transparent 70%);
        filter: blur(60px);
        pointer-events: none;
      }

      /* Glass Card (Premium Glassmorphism) */
      .glass-card {
        background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.01) 100%);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(107, 45, 139, 0.1);
        border-top: 1px solid rgba(255, 255, 255, 0.15);
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 40px rgba(107, 45, 139, 0.08);
        border-radius: 1.25rem;
        transition: border-color 0.3s ease;
      }

      .glass-card:hover {
        border-color: rgba(197, 165, 114, 0.3);
      }

      .glass-card-neon {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 20px rgba(107, 45, 139, 0.15);
      }

      .glass-card-purple {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 30px rgba(107, 45, 139, 0.2);
      }

      /* Glass Pill (for toggles and badges) */
      .glass-pill {
        background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-top: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        border-radius: 9999px;
      }

      /* Progress Bar Track */
      .progress-track {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(4px);
        border-radius: 9999px;
        overflow: hidden;
      }

      /* Glowing fill for progress and toggles */
      .glow-fill {
        background: linear-gradient(90deg, #6B2D8B 0%, #C5A572 100%);
        box-shadow: 0 0 10px rgba(197, 165, 114, 0.5);
      }

      /* Toggle switch thumb */
      .toggle-thumb {
        background: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset -2px -2px 4px rgba(0,0,0,0.2);
        border-radius: 50%;
      }

      /* Neon Text Styles */
      .text-neon-gold {
        color: #C5A572;
        text-shadow: 0 0 10px rgba(197, 165, 114, 0.4);
      }
      .text-neon-purple {
        color: #6B2D8B;
        text-shadow: 0 0 10px rgba(107, 45, 139, 0.4);
      }

      /* STANDARD CTA BUTTON STYLE */
      .btn-neon {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border-radius: 0.5rem;
        color: white;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        background: transparent;
        transition: all 0.3s ease;
        z-index: 10;
        box-shadow: 0 0 15px rgba(197, 165, 114, 0.2);
        border: 0;
      }

      /* The Spinning Border Background */
      .btn-neon::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 400%;
        height: 400%;
        background: conic-gradient(
            from 0deg,
            #6B2D8B 0%,
            #8B5CB8 25%,
            #C5A572 50%,
            #8B5CB8 75%,
            #6B2D8B 100%
        );
        transform: translate(-50%, -50%);
        animation: spin 3s linear infinite;
        z-index: -2;
      }

      /* The Inner Mask */
      .btn-neon::after {
        content: '';
        position: absolute;
        inset: 2px;
        background: #070514; /* Same as body bg */
        border-radius: 0.4rem;
        z-index: -1;
      }

      .btn-neon:hover {
        box-shadow: 0 0 25px rgba(197, 165, 114, 0.5);
        transform: translateY(-2px);
      }

      /* Marquee Animation */
      @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      
      .animate-scroll {
        animation: scroll 60s linear infinite;
      }
      
      .animate-scroll:hover {
        animation-play-state: paused;
      }
    </style>
